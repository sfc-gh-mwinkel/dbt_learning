version: 2

models:
  - name: int_orders_with_payments
    description: "Orders enriched with payment details and paid status"
    columns:
      - name: order_id
        description: "Primary key"
        tests:
          - not_null
          - unique

  - name: int_order_items_with_products
    description: "Line items enriched with product name and category"
    columns:
      - name: line_item_id
        description: "Primary key"
        tests:
          - not_null
          - unique

  - name: int_customers__order_summary
    description: "Customers enriched with order metrics and tier classification"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - not_null
          - unique
