version: 2

sources:
  - name: raw
    description: "Raw seed data loaded via dbt seed"
    schema: "{{ generate_schema_name('raw') }}"
    tables:
      - name: customers
        description: "Raw customer records"
        columns:
          - name: customer_id
            description: "Unique identifier for each customer"
            tests:
              - not_null
              - unique
          - name: email
            description: "Customer email address"
            tests:
              - not_null

      - name: orders
        description: "Raw order records"
        columns:
          - name: order_id
            description: "Unique identifier for each order"
            tests:
              - not_null
              - unique
          - name: status
            description: "Current order status"
            tests:
              - accepted_values:
                  arguments:
                    values: ['completed', 'pending', 'shipped', 'returned', 'cancelled']
      
      - name: order_items
        description: "Raw order line items"
      
      - name: products
        description: "Raw product catalog"
      
      - name: payments
        description: "Raw payment transactions"
